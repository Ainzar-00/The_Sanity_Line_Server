# App name
spring.application.name=demo

# Server port (optional)
server.port=8080

# --------------------------------------------------
# DATABASE CONFIG (MySQL)
# --------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3310/sanitydb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=V9@rK7!qL2#xT8mZ
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --------------------------------------------------
# JPA / HIBERNATE
# --------------------------------------------------

# Options: none | validate | update | create | create-drop
spring.jpa.hibernate.ddl-auto=update

# Show SQL in console (for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Naming strategy (important for matching your table names exactly)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --------------------------------------------------
# CONNECTION POOL (Hikari - default)
# --------------------------------------------------
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000

# --------------------------------------------------
# LOGGING (optional but useful)
# --------------------------------------------------
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
